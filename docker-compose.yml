volumes:
  tunnel:

services:

  web:
    build: web/server
    restart: unless-stopped
    volumes:
      - ./web/static:/static:ro

  cloudflared:
    build: cloudflared
    restart: unless-stopped
    depends_on:
      - web
    volumes:
      - tunnel:/tunnel

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - cloudflared
    volumes:
      - tunnel:/tunnel:ro
    deploy:
      resources:
        limits:
          memory: 512m
