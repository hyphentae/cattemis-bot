<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cattemis :3</title>
<style>
  /* ── Catppuccin Mocha palette ────────────────────────────── */
  :root {
    --base:      #1e1e2e;
    --mantle:    #181825;
    --crust:     #11111b;
    --surface0:  #313244;
    --surface1:  #45475a;
    --surface2:  #585b70;
    --overlay0:  #6c7086;
    --overlay1:  #7f849c;
    --overlay2:  #9399b2;
    --subtext0:  #a6adc8;
    --subtext1:  #bac2de;
    --text:      #cdd6f4;
    --lavender:  #b4befe;
    --blue:      #89b4fa;
    --sapphire:  #74c7ec;
    --sky:       #89dceb;
    --teal:      #94e2d5;
    --green:     #a6e3a1;
    --yellow:    #f9e2af;
    --peach:     #fab387;
    --maroon:    #eba0ac;
    --red:       #f38ba8;
    --mauve:     #cba6f7;
    --pink:      #f5c2e7;
    --flamingo:  #f2cdcd;
    --rosewater: #f5e0dc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--base);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Scrollbar ──────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 99px; }

  /* ── Sidebar ────────────────────────────────────────────── */
  #sidebar {
    width: 210px;
    min-width: 210px;
    background: var(--mantle);
    border-right: 1px solid var(--surface0);
    display: flex;
    flex-direction: column;
    padding: 0;
    gap: 0;
  }

  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 28px 18px 20px;
    border-bottom: 1px solid var(--surface0);
    position: relative;
    overflow: hidden;
  }
  .logo::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(203,166,247,.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .logo-cat {
    font-size: 2.6rem;
    line-height: 1;
    animation: float 3.5s ease-in-out infinite;
    display: block;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }
  .logo h1 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--mauve);
    letter-spacing: .03em;
    margin-top: 2px;
  }
  .logo small {
    font-size: .72rem;
    color: var(--overlay1);
  }

  .nav-section {
    padding: 14px 10px 6px;
    font-size: .65rem;
    font-weight: 600;
    color: var(--overlay0);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    color: var(--subtext1);
    font-size: .875rem;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    border-radius: 8px;
    margin: 1px 8px;
    width: calc(100% - 16px);
    transition: background .15s, color .15s;
  }
  .nav-btn:hover  { background: var(--surface0); color: var(--text); }
  .nav-btn.active { background: rgba(203,166,247,.15); color: var(--mauve); }
  .nav-btn.active .icon { filter: drop-shadow(0 0 4px var(--mauve)); }
  .nav-btn .icon  { font-size: 1.05rem; width: 20px; text-align: center; }

  .sidebar-footer {
    margin-top: auto;
    padding: 14px 16px;
    border-top: 1px solid var(--surface0);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .75rem;
    color: var(--subtext0);
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface0);
    padding: 4px 10px;
    border-radius: 99px;
    font-size: .72rem;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse-dot 2s ease-in-out infinite; }
  .dot.offline { background: var(--red); animation: none; }
  @keyframes pulse-dot {
    0%,100% { box-shadow: 0 0 0 0 rgba(166,227,161,.4); }
    50%      { box-shadow: 0 0 0 5px rgba(166,227,161,0); }
  }

  /* ── Main ───────────────────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--base);
  }

  #topbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--surface0);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(24,24,37,.6);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
  }
  #topbar h2 {
    font-size: .95rem;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topbar-right { display: flex; align-items: center; gap: 10px; }

  /* ── Pages ──────────────────────────────────────────────── */
  .page { display: none; flex: 1; overflow-y: auto; padding: 24px; flex-direction: column; gap: 20px; }
  .page.active { display: flex; }

  /* ── Section header ─────────────────────────────────────── */
  .section-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title {
    font-size: .78rem;
    font-weight: 700;
    color: var(--subtext0);
    text-transform: uppercase;
    letter-spacing: .08em;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Stat cards ─────────────────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
  }
  .stat-card {
    background: var(--mantle);
    border: 1px solid var(--surface0);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s, transform .2s;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--mauve));
    border-radius: 14px 14px 0 0;
  }
  .stat-card:hover { border-color: var(--card-accent, var(--mauve)); transform: translateY(-2px); }
  .stat-card .s-icon { font-size: 1.4rem; margin-bottom: 4px; }
  .stat-card .s-label { font-size: .7rem; color: var(--subtext0); text-transform: uppercase; letter-spacing: .06em; }
  .stat-card .s-value { font-size: 1.8rem; font-weight: 800; color: var(--card-accent, var(--mauve)); line-height: 1.1; }
  .stat-card .s-sub   { font-size: .72rem; color: var(--overlay1); }

  /* ── Uptime banner ───────────────────────────────────────── */
  .uptime-banner {
    background: linear-gradient(135deg, rgba(166,227,161,.08), rgba(148,226,213,.04));
    border: 1px solid rgba(166,227,161,.25);
    border-radius: 14px;
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .uptime-banner .ub-icon { font-size: 2rem; }
  .uptime-banner .ub-val  { font-size: 1.4rem; font-weight: 700; color: var(--green); }
  .uptime-banner .ub-lbl  { font-size: .75rem; color: var(--subtext0); }
  .uptime-banner .ub-bot  { margin-left: auto; font-size: .8rem; color: var(--subtext0); text-align: right; }
  .uptime-banner .ub-bot strong { color: var(--lavender); display: block; font-size: .9rem; }

  /* ── Download cards ─────────────────────────────────────── */
  .dl-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }
  .dl-card {
    background: var(--mantle);
    border: 1px solid var(--surface0);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color .2s, transform .2s;
  }
  .dl-card:hover { border-color: var(--blue); transform: translateY(-2px); }
  .dl-card .dl-ico  { font-size: 1.4rem; }
  .dl-card .dl-name { font-size: .72rem; color: var(--subtext0); }
  .dl-card .dl-cnt  { font-size: 1.15rem; font-weight: 700; color: var(--blue); }

  /* ── LLM error rate bar ─────────────────────────────────── */
  .err-bar-wrap {
    background: var(--mantle);
    border: 1px solid var(--surface0);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .err-bar-label { font-size: .78rem; color: var(--subtext0); display: flex; justify-content: space-between; }
  .err-bar-track { background: var(--surface0); border-radius: 99px; height: 6px; overflow: hidden; }
  .err-bar-fill  { height: 100%; border-radius: 99px; background: var(--green); transition: width .6s ease; }
  .err-bar-fill.bad { background: var(--red); }

  /* ── Chats list ─────────────────────────────────────────── */
  .chats-list { display: flex; flex-direction: column; gap: 8px; }
  .chat-item {
    background: var(--mantle);
    border: 1px solid var(--surface0);
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color .15s, transform .15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chat-item:hover    { border-color: var(--mauve); transform: translateX(3px); }
  .chat-item.selected { border-color: var(--mauve); background: var(--surface0); }
  .chat-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, var(--mauve), var(--pink));
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
    box-shadow: 0 0 8px rgba(203,166,247,.3);
  }
  .chat-meta        { flex: 1; overflow: hidden; }
  .chat-meta .cid   { font-size: .85rem; font-weight: 600; color: var(--lavender); }
  .chat-meta .cprev { font-size: .75rem; color: var(--subtext0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge {
    background: var(--surface1); color: var(--subtext1);
    font-size: .68rem; padding: 2px 8px; border-radius: 99px; white-space: nowrap;
  }

  /* ── Chat detail ────────────────────────────────────────── */
  #chat-detail { display: none; flex-direction: column; gap: 12px; }
  #chat-detail.visible { display: flex; }
  #back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none; color: var(--subtext1);
    cursor: pointer; font-size: .85rem; padding: 0;
  }
  #back-btn:hover { color: var(--mauve); }
  .history-wrap { display: flex; flex-direction: column; gap: 8px; }
  .hist-msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: .88rem;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .hist-msg.user {
    align-self: flex-end;
    background: var(--surface1);
    border-bottom-right-radius: 4px;
  }
  .hist-msg.assistant {
    align-self: flex-start;
    background: var(--mantle);
    border: 1px solid var(--surface0);
    border-bottom-left-radius: 4px;
  }
  .role-label { font-size: .67rem; color: var(--mauve); margin-bottom: 4px; font-weight: 600; }

  /* ── Chat UI page ───────────────────────────────────────── */
  #page-chat { padding: 0 !important; }
  #messages {
    flex: 1;
    padding: 20px 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: .9rem;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    animation: msg-in .2s ease;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--mauve), var(--pink));
    color: var(--base);
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--mantle);
    border: 1px solid var(--surface0);
    border-bottom-left-radius: 4px;
  }
  .msg.bot .name { font-size: .68rem; color: var(--mauve); margin-bottom: 4px; font-weight: 600; }
  #inputbar {
    padding: 14px 20px;
    border-top: 1px solid var(--surface0);
    display: flex;
    gap: 10px;
    background: rgba(24,24,37,.8);
    backdrop-filter: blur(12px);
  }
  #chat-input {
    flex: 1;
    background: var(--surface0);
    border: 1px solid var(--surface1);
    border-radius: 12px;
    padding: 9px 14px;
    color: var(--text);
    font-size: .9rem;
    outline: none;
    resize: none;
    font-family: inherit;
    transition: border-color .15s;
  }
  #chat-input:focus { border-color: var(--mauve); }
  #send-btn {
    background: linear-gradient(135deg, var(--mauve), var(--pink));
    color: var(--base);
    border: none;
    border-radius: 12px;
    padding: 9px 18px;
    cursor: pointer;
    font-size: .9rem;
    font-weight: 700;
    transition: opacity .15s, transform .1s;
  }
  #send-btn:hover    { opacity: .9; transform: scale(1.03); }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* ── Buttons ────────────────────────────────────────────── */
  .refresh-btn {
    display: flex; align-items: center; gap: 5px;
    background: none; border: 1px solid var(--surface1);
    color: var(--subtext1); border-radius: 8px;
    padding: 5px 12px; cursor: pointer; font-size: .78rem;
    transition: border-color .15s, color .15s;
  }
  .refresh-btn:hover { border-color: var(--mauve); color: var(--mauve); }
  .error-msg { color: var(--red); font-size: .82rem; }

  /* ── Empty state ────────────────────────────────────────── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; padding: 40px 20px;
    color: var(--subtext0); font-size: .85rem; text-align: center;
  }
  .empty-state .es-ico { font-size: 2.5rem; }

  /* ── Typing indicator ───────────────────────────────────── */
  .typing { display: flex; gap: 4px; align-items: center; padding: 6px 4px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--overlay1);
    animation: bounce .9s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(.8); opacity: .5; }
    40%          { transform: scale(1.2); opacity: 1; }
  }
</style>
</head>
<body>

<!-- ───────────────────── Sidebar ─────────────────────────── -->
<div id="sidebar">
  <div class="logo">
    <span class="logo-cat">🐱</span>
    <h1>Cattemis :3</h1>
    <small>dashboard</small>
  </div>

  <div class="nav-section">monitor</div>
  <button class="nav-btn active" data-page="stats" onclick="showPage('stats',this)">
    <span class="icon">📊</span> Statistics
  </button>
  <button class="nav-btn" data-page="chats" onclick="showPage('chats',this)">
    <span class="icon">💬</span> Chats
  </button>

  <div class="nav-section">interact</div>
  <button class="nav-btn" data-page="chat" onclick="showPage('chat',this)">
    <span class="icon">🤖</span> Chat
  </button>

  <div class="sidebar-footer">
    <div class="status-pill">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">loading…</span>
    </div>
  </div>
</div>

<!-- ───────────────────── Main ────────────────────────────── -->
<div id="main">
  <div id="topbar">
    <h2><span id="page-icon">📊</span> <span id="page-title">Statistics</span></h2>
    <div class="topbar-right">
      <span id="topbar-sub" style="font-size:.75rem;color:var(--subtext0)"></span>
    </div>
  </div>

  <!-- ── STATS PAGE ────────────────────────────────────────── -->
  <div class="page active" id="page-stats">
    <div class="section-row">
      <span class="section-title">✦ overview</span>
      <button class="refresh-btn" onclick="loadStats()">↻ refresh</button>
    </div>

    <div class="uptime-banner" id="uptime-banner">
      <div class="ub-icon">⏱️</div>
      <div>
        <div class="ub-lbl">uptime</div>
        <div class="ub-val" id="uptime-val">—</div>
      </div>
      <div class="ub-bot">
        <strong id="bot-name-lbl">—</strong>
        bot username
      </div>
    </div>

    <div class="stats-grid" id="stats-grid"></div>

    <div class="section-row">
      <span class="section-title">✦ downloads</span>
    </div>
    <div class="dl-grid" id="dl-grid"></div>

    <div class="section-row">
      <span class="section-title">✦ llm health</span>
    </div>
    <div class="err-bar-wrap" id="err-bar-wrap">
      <div class="err-bar-label">
        <span>success rate</span>
        <span id="err-pct">—</span>
      </div>
      <div class="err-bar-track"><div class="err-bar-fill" id="err-bar-fill" style="width:0"></div></div>
    </div>

    <div class="error-msg" id="stats-error"></div>
  </div>

  <!-- ── CHATS PAGE ────────────────────────────────────────── -->
  <div class="page" id="page-chats">
    <div class="section-row">
      <span class="section-title">✦ active chats</span>
      <button class="refresh-btn" onclick="loadChats()">↻ refresh</button>
    </div>
    <div class="chats-list" id="chats-list"></div>
    <div id="chat-detail">
      <button id="back-btn" onclick="backToChats()">← back</button>
      <div class="history-wrap" id="history-wrap"></div>
    </div>
    <div class="error-msg" id="chats-error"></div>
  </div>

  <!-- ── CHAT PAGE ─────────────────────────────────────────── -->
  <div class="page" id="page-chat">
    <div id="messages">
      <div class="msg bot">
        <div class="name">cattemis 🐾</div>
        <span>Nya~ привет! Чем могу помочь? :3</span>
      </div>
    </div>
    <div id="inputbar">
      <textarea id="chat-input" rows="1" placeholder="напиши что-нибудь…"></textarea>
      <button id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script>
const PAGE_META = {
  stats: { title: 'Statistics', icon: '📊' },
  chats: { title: 'Chats',      icon: '💬' },
  chat:  { title: 'Chat',       icon: '🤖' },
};
let chatHistory = [];

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('page-title').textContent = PAGE_META[id].title;
  document.getElementById('page-icon').textContent  = PAGE_META[id].icon;
  if (id === 'stats') loadStats();
  if (id === 'chats') loadChats();
}

/* ── STATUS ─────────────────────────────────────────────────── */
async function checkStatus() {
  try {
    const r = await fetch('/api/health');
    const d = await r.json();
    document.getElementById('status-dot').classList.remove('offline');
    document.getElementById('status-text').textContent = d.bot || 'online';
  } catch {
    document.getElementById('status-dot').classList.add('offline');
    document.getElementById('status-text').textContent = 'offline';
  }
}

/* ── STATS ──────────────────────────────────────────────────── */
function fmtUptime(s) {
  const d = Math.floor(s / 86400), h = Math.floor((s%86400)/3600),
        m = Math.floor((s%3600)/60), sec = s%60;
  if (d > 0) return `${d}d ${h}h ${m}m`;
  if (h > 0) return `${h}h ${m}m ${sec}s`;
  return `${m}m ${sec}s`;
}

async function loadStats() {
  document.getElementById('stats-error').textContent = '';
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    if (d.error) { document.getElementById('stats-error').textContent = d.error; return; }

    document.getElementById('uptime-val').textContent = fmtUptime(d.uptime_seconds);
    document.getElementById('bot-name-lbl').textContent = d.bot_username ? '@' + d.bot_username : '—';
    document.getElementById('topbar-sub').textContent = d.bot_username ? '@' + d.bot_username : '';

    const CARDS = [
      { label:'Messages',    value: d.messages_total,  sub:'total processed',    icon:'✉️',  accent:'var(--mauve)'   },
      { label:'Commands',    value: d.commands_used,   sub:'used',               icon:'⌘',   accent:'var(--blue)'    },
      { label:'LLM Calls',   value: d.llm_calls,       sub:`${d.llm_errors} errors`, icon:'🧠', accent:'var(--green)' },
      { label:'Media',       value: d.media_total,     sub:`${d.media_errors} errors`, icon:'📎', accent:'var(--peach)' },
      { label:'Unique Chats',value: d.unique_chats,    sub:'seen',               icon:'👥',  accent:'var(--lavender)'},
    ];
    document.getElementById('stats-grid').innerHTML = CARDS.map(c => `
      <div class="stat-card" style="--card-accent:${c.accent}">
        <div class="s-icon">${c.icon}</div>
        <div class="s-label">${c.label}</div>
        <div class="s-value">${c.value ?? 0}</div>
        <div class="s-sub">${c.sub}</div>
      </div>`).join('');

    const DLS = [
      { name:'TikTok',        cnt: d.tiktok_downloads,          ico:'🎵' },
      { name:'Instagram',     cnt: d.instagram_downloads,       ico:'📸' },
      { name:'Twitter / X',   cnt: d.twitter_downloads,         ico:'🐦' },
      { name:'Direct image',  cnt: d.direct_image_downloads,    ico:'🖼️' },
      { name:'yt-dlp',        cnt: d.ytdlp_downloads,           ico:'▶️' },
    ];
    document.getElementById('dl-grid').innerHTML = DLS.map(d => `
      <div class="dl-card">
        <div class="dl-ico">${d.ico}</div>
        <div>
          <div class="dl-name">${d.name}</div>
          <div class="dl-cnt">${d.cnt ?? 0}</div>
        </div>
      </div>`).join('');

    // LLM health bar
    const total  = (d.llm_calls || 0);
    const errors = (d.llm_errors || 0);
    const pct    = total > 0 ? Math.round(((total - errors) / total) * 100) : 100;
    document.getElementById('err-pct').textContent = pct + '%';
    const fill = document.getElementById('err-bar-fill');
    fill.style.width = pct + '%';
    fill.classList.toggle('bad', pct < 80);
  } catch(e) {
    document.getElementById('stats-error').textContent = 'Failed to load stats: ' + e.message;
  }
}

/* ── CHATS ──────────────────────────────────────────────────── */
let chatsData = [];

async function loadChats() {
  document.getElementById('chats-error').textContent = '';
  document.getElementById('chat-detail').classList.remove('visible');
  document.getElementById('chats-list').style.display = 'flex';
  try {
    const r = await fetch('/api/chats');
    const d = await r.json();
    if (d.error) { document.getElementById('chats-error').textContent = d.error; return; }
    chatsData = d.chats || [];
    const list = document.getElementById('chats-list');
    if (chatsData.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="es-ico">🐱</div><div>No active chats yet nyaa~</div></div>`;
      return;
    }
    list.innerHTML = chatsData.map(c => `
      <div class="chat-item" onclick="openChat(${c.chat_id})">
        <div class="chat-avatar">💬</div>
        <div class="chat-meta">
          <div class="cid">${c.chat_id}</div>
          <div class="cprev">${escHtml(c.last_preview || '—')}</div>
        </div>
        <div class="badge">${c.message_count} msgs</div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('chats-error').textContent = 'Failed: ' + e.message;
  }
}

async function openChat(chatId) {
  document.getElementById('chats-list').style.display = 'none';
  const detail = document.getElementById('chat-detail');
  detail.classList.add('visible');
  const wrap = document.getElementById('history-wrap');
  wrap.innerHTML = `<div style="color:var(--subtext0);font-size:.85rem">Loading…</div>`;
  try {
    const r = await fetch(`/api/chats/${chatId}`);
    const d = await r.json();
    if (d.error) { wrap.innerHTML = `<div class="error-msg">${d.error}</div>`; return; }
    const h = d.history || [];
    if (h.length === 0) { wrap.innerHTML = `<div class="empty-state"><div class="es-ico">📭</div><div>Empty history</div></div>`; return; }
    wrap.innerHTML = h.map(m => `
      <div class="hist-msg ${m.role}">
        <div class="role-label">${m.role}</div>
        ${escHtml(m.content)}
      </div>`).join('');
  } catch(e) {
    wrap.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

function backToChats() {
  document.getElementById('chat-detail').classList.remove('visible');
  document.getElementById('chats-list').style.display = 'flex';
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── CHAT UI ────────────────────────────────────────────────── */
const msgsEl   = document.getElementById('messages');
const inputEl  = document.getElementById('chat-input');
const sendBtnEl = document.getElementById('send-btn');

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  if (role !== 'user') {
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = 'cattemis 🐾';
    div.appendChild(name);
  }
  const span = document.createElement('span');
  span.textContent = text;
  div.appendChild(span);
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return span;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="name">cattemis 🐾</div><div class="typing"><span></span><span></span><span></span></div>';
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMsg() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtnEl.disabled = true;
  addMsg('user', text);
  chatHistory.push({ role: 'user', content: text });
  addTyping();
  let content;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: chatHistory.slice(0,-1) })
    });
    removeTyping();
    content = addMsg('bot', '');
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let full = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      dec.decode(value).split('\n').filter(Boolean).forEach(line => {
        try {
          const d = JSON.parse(line);
          if (d.chunk) { full += d.chunk; content.textContent = full; msgsEl.scrollTop = msgsEl.scrollHeight; }
          if (d.done)  chatHistory.push({ role: 'assistant', content: d.full });
        } catch {}
      });
    }
  } catch(e) {
    removeTyping();
    if (!content) content = addMsg('bot', '');
    content.textContent = 'ошибка: ' + e.message;
  }
  sendBtnEl.disabled = false;
  inputEl.focus();
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

/* ── INIT ───────────────────────────────────────────────────── */
checkStatus();
loadStats();
setInterval(checkStatus, 15000);
setInterval(() => {
  const activeBtn = document.querySelector('.nav-btn.active');
  if (activeBtn && activeBtn.dataset.page === 'stats') loadStats();
}, 30000);
</script>
