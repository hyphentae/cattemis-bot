<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#171525">
  <title>Cattemis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="orb orb-one"></div>
  <div class="orb orb-two"></div>

  <svg class="svg-sprite" aria-hidden="true">
    <symbol id="icon-x" viewBox="0 0 24 24">
      <path d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59 7.11 5.7A1 1 0 0 0 5.7 7.11L10.59 12 5.7 16.89a1 1 0 1 0 1.41 1.41L12 13.41l4.89 4.89a1 1 0 0 0 1.41-1.41L13.41 12l4.89-4.89a1 1 0 0 0 0-1.4z"/>
    </symbol>
    <symbol id="icon-o" viewBox="0 0 24 24">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
      <circle cx="12" cy="12" r="4" opacity=".35"/>
    </symbol>
  </svg>

  <section class="screen active" id="screen-menu">
    <main class="panel menu-panel">
      <div class="avatar" aria-hidden="true">🐾</div>
      <header class="hero-copy">
        <div class="eyebrow">telegram mini app</div>
        <h1 class="brand">cattemis</h1>
        <p class="tagline">маленькое место для больших перерывов</p>
      </header>

      <div class="user-chip" id="user-chip">
        <div class="user-dot">👤</div>
        <span id="user-name"></span>
      </div>

      <div class="section-heading">
        <h2 class="section-label">выбери игру</h2>
        <span class="section-count">1 доступна</span>
      </div>

      <div class="games">
        <button class="card ttt" id="open-ttt" type="button">
          <span class="card-icon"><svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><use href="#icon-x"/></svg></span>
          <span class="card-info"><strong>крестики-нолики</strong><small>сыграть против Кэттемис</small></span>
          <span class="card-arrow">→</span>
        </button>
        <div class="card chk disabled" aria-disabled="true">
          <div class="card-icon">🔴</div>
          <div class="card-info"><strong>шашки</strong><small>готовим игровое поле</small></div>
          <span class="badge-soon">скоро</span>
        </div>
        <div class="card ches disabled" aria-disabled="true">
          <div class="card-icon">♟️</div>
          <div class="card-info"><strong>шахматы</strong><small>учим кота дебютам</small></div>
          <span class="badge-soon">скоро</span>
        </div>
      </div>
    </main>
  </section>

  <section class="screen" id="screen-ttt">
    <main class="panel game-panel">
      <header class="game-topbar">
        <button class="back-btn" id="back-menu" type="button" aria-label="Вернуться в меню">←</button>
        <div class="game-title"><strong>крестики-нолики</strong><span>ты играешь за крестики</span></div>
      </header>

      <div class="score-row">
        <div class="score-chip you"><span>ты</span><strong id="score-you">0</strong></div>
        <div class="score-chip draw"><span>ничья</span><strong id="score-draw">0</strong></div>
        <div class="score-chip bot"><span>Кэттемис</span><strong id="score-bot">0</strong></div>
      </div>

      <div class="status-bar" id="ttt-status" aria-live="polite">твой ход</div>
      <div class="board" id="ttt-board" role="grid" aria-label="Поле крестиков-ноликов"></div>
      <button class="restart-btn" id="restart-ttt" type="button">сыграть заново</button>
    </main>
  </section>
</body>
</html>
