<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parabolic Chess</title>
  <style>
    :root {
      color-scheme: dark;
      --base: #1e1e2e;
      --mantle: #181825;
      --crust: #11111b;
      --surface-0: #313244;
      --surface-1: #45475a;
      --overlay-0: #6c7086;
      --text: #cdd6f4;
      --subtext-1: #bac2de;
      --mauve: #cba6f7;
      --blue: #89b4fa;
      --green: #a6e3a1;
      --red: #f38ba8;
    }

    * { box-sizing: border-box; }

    body, html {
      width: 100%;
      height: 100%;
    }

    body {
      display: flex;
      margin: 0;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: var(--text);
      background: var(--mantle);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      overscroll-behavior: none;
    }

    canvas {
      display: block;
      border-radius: 14px;
      background: var(--base);
      touch-action: none;
    }

    .network-overlay {
      position: fixed;
      z-index: 999;
      display: flex;
      inset: 0;
      padding: 24px;
      align-items: center;
      justify-content: center;
      color: var(--text);
      background: rgba(17, 17, 27, .82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      text-align: center;
    }

    .net-card {
      display: flex;
      width: min(100%, 340px);
      padding: 24px;
      border: 1px solid var(--surface-1);
      border-radius: 16px;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      background: var(--base);
      box-shadow: 0 20px 60px rgba(17, 17, 27, .45);
    }

    .net-title { margin-bottom: 2px; font-size: 1.15rem; font-weight: 700; }
    .net-copy { color: var(--subtext-1); font-size: .78rem; }
    .net-error { color: var(--red); font-size: .86rem; }

    .net-button,
    .net-input {
      min-height: 44px;
      border-radius: 10px;
      font: inherit;
      appearance: none;
      -webkit-appearance: none;
    }

    .net-button {
      border: 1px solid var(--surface-1);
      color: var(--text);
      background: var(--surface-0);
      cursor: pointer;
      font-size: .82rem;
      font-weight: 600;
      transition: border-color .15s, background .15s;
    }

    .net-button:hover { border-color: var(--mauve); background: var(--surface-1); }
    .net-button:focus-visible, .net-input:focus-visible { outline: 2px solid var(--mauve); outline-offset: 2px; }

    .net-input {
      width: 100%;
      padding: 0 16px;
      border: 1px solid var(--surface-1);
      outline: 0;
      color: var(--text);
      background: var(--mantle);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-align: center;
      text-transform: uppercase;
    }

    .net-input::placeholder { color: var(--overlay-0); }

    .net-code {
      padding: 10px 14px;
      border: 1px solid var(--surface-1);
      border-radius: 10px;
      color: var(--mauve);
      background: var(--mantle);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: .22em;
    }
  </style>
</head>
<body>

<script src="images.js"></script>
<script src="parabolic.js"></script>
<script src="net.js"></script>

</body>
</html>
